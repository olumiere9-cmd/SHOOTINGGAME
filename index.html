<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cup Shooting Game</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1a1a1a;
    color:white;
    text-align:center;
}

h1{
    margin-top:10px;
}

#gameArea{
    width:100%;
    height:500px;
    background:#2e2e2e;
    position:relative;
    overflow:hidden;
    border-top:3px solid white;
    cursor:crosshair;
}

.cup{
    width:60px;
    height:80px;
    background:red;
    border-radius:10px 10px 5px 5px;
    position:absolute;
    bottom:0;
}

#hud{
    margin:10px;
    font-size:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    border:none;
    background:#00b894;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#019875;
}

</style>
</head>
<body>

<h1>🎯 Cup Shooting Game</h1>

<div id="hud">
Score: <span id="score">0</span> |
Ammo: <span id="ammo">20</span> |
Time: <span id="time">30</span>
</div>

<button onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<script>

let score = 0
let ammo = 20
let time = 30
let gameRunning = false
let cups = []

const gameArea = document.getElementById("gameArea")

function startGame(){

    score = 0
    ammo = 20
    time = 30
    cups = []
    gameArea.innerHTML=""

    updateHUD()

    gameRunning = true

    spawnCup()

    let timer = setInterval(()=>{
        time--
        updateHUD()

        if(time<=0){
            clearInterval(timer)
            gameRunning=false
            alert("Game Over! Score: "+score)
        }

    },1000)

}

function updateHUD(){
    document.getElementById("score").innerText=score
    document.getElementById("ammo").innerText=ammo
    document.getElementById("time").innerText=time
}

function spawnCup(){

    if(!gameRunning) return

    let cup = document.createElement("div")
    cup.classList.add("cup")

    cup.style.left = Math.random()*90 + "%"

    let speed = Math.random()*2 + 1
    let direction = 1

    cup.onclick = function(e){

        if(!gameRunning) return

        score++
        updateHUD()

        cup.remove()
    }

    gameArea.appendChild(cup)

    let move = setInterval(()=>{

        let left = cup.offsetLeft

        if(left + cup.offsetWidth > gameArea.offsetWidth || left < 0){
            direction *= -1
        }

        cup.style.left = (left + speed*direction) + "px"

        if(!gameRunning){
            clearInterval(move)
        }

    },20)

    cups.push(cup)

    setTimeout(spawnCup,1200)

}

gameArea.addEventListener("click",function(e){

    if(!gameRunning) return

    if(ammo<=0) return

    ammo--
    updateHUD()

})

</script>

</body>
</html>
